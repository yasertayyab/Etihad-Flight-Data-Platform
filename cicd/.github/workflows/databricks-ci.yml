name: Databricks Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  terraform-plan:
    name: Terraform plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.7
      - run: terraform init infra/terraform
      - run: terraform validate infra/terraform
      - run: terraform plan -input=false -var-file=infra/terraform/terraform.tfvars

  deploy-databricks:
    name: Deploy Databricks resources
    runs-on: ubuntu-latest
    needs: terraform-plan
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.7
      - run: terraform init infra/terraform
      - run: terraform apply -auto-approve -var-file=infra/terraform/terraform.tfvars
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
